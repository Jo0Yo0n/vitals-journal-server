      additionalProperties: false
    ThresholdUpdateRequest:
      type: object
      properties:
        ruleDetails:
          $ref: "#/components/schemas/ThresholdRuleDetails"
      description: Threshold 수정(버전 생성). ruleDetails만 변경 가능
      additionalProperties: false
    ThresholdListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Threshold"
      required:
        - items
