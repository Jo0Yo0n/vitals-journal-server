      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Threshold"
              examples:
                success:
                  summary: 수정 성공(신규 버전 반환)
                  value:
                    id: 301
                    userId: 1
                    metric: HR
                    ruleType: range
                    createdAt: "2026-03-01T09:00:00Z"
                    deletedAt: null
                    ruleDetails:
                      ruleType: range
                      minValue: 45.0
                      maxValue: 105.0
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Not Found - threshold 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                not_found:
                  summary: Not Found - threshold 없음
                  value:
                    code: THRESHOLD_NOT_FOUND
                    message: Threshold not found
                    fieldErrors: []
                    traceId: f6d6b0e6b9b64c65
                    timestamp: "2026-03-02T12:34:56Z"
      description: |-
        Threshold 수정(버전 생성).

        - 인증: Bearer Access Token
        - 방식:
          1) 기존 threshold를 soft delete(deletedAt=now())
          2) 수정된 내용으로 새로운 threshold row 생성 후 반환
        - 수정된 threshold는 향후 record 평가에만 적용됩니다.
        - 과거 alert/violation은 자동 재평가하지 않습니다.
      operationId: updateThreshold
      security:
        - bearerAuth: []
    delete:
      tags:
        - Threshold
      summary: Threshold 삭제(soft-delete)
      description: |-
        Threshold 삭제(soft-delete).

        - 인증: Bearer Access Token
        - 삭제된 threshold는 향후 record 평가에서 제외됩니다.
        - 해당 threshold로 과거에 생성된 alert/violation은 변경/삭제하지 않습니다(평가 이력).
      parameters:
        - $ref: "#/components/parameters/ThresholdId"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Not Found - threshold 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                not_found:
                  summary: Not Found - threshold 없음
                  value:
                    code: THRESHOLD_NOT_FOUND
                    message: Threshold not found
                    fieldErrors: []
                    traceId: f6d6b0e6b9b64c65
                    timestamp: "2026-03-02T12:34:56Z"
      operationId: deleteThreshold
      security:
        - bearerAuth: []
  /alerts:
