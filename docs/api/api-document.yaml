openapi: 3.0.3
info:
  title: Healthcare Threshold & Alert API
  version: 0.1.0
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: User
  - name: HealthRecord
  - name: Threshold
  - name: Alert
paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: эЪМьЫРъ░АьЮЕ
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/login:
    post:
      tags:
        - Auth
      summary: ыбЬъ╖╕ьЭ╕
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /users/me:
    get:
      tags:
        - User
      summary: ыВ┤ ьаХы│┤ ьб░эЪМ
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      tags:
        - User
      summary: эЪМьЫР эГИэЗ┤(soft-delete)
      description: ьВмьЪйьЮР ъ│ДьаХьЭД soft-delete ь▓ШыжмэХШый░, ьЭ┤эЫД ыбЬъ╖╕ьЭ╕/эЖаэБ░ ьЮмы░Ьъ╕Й ы╢Иъ░А
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /health-records:
    get:
      tags:
        - HealthRecord
      summary: ъ▒┤ъ░Х ь╕бьаХ ъ╕░ыбЭ ыкйыбЭ ьб░эЪМ
      parameters:
        - $ref: "#/components/parameters/FromMeasuredAt"
        - $ref: "#/components/parameters/ToMeasuredAt"
        - $ref: "#/components/parameters/Type"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthRecordListResponse"
    post:
      tags:
        - HealthRecord
      summary: ъ▒┤ъ░Х ь╕бьаХ ъ╕░ыбЭ ьГЭьД▒
      description:
        "- ъ│╝ъ▒░ ьЛЬьаР(measuredAt)ьЭШ recordые╝ ьЮЕыаеэХ┤ыПД ьЮЕыае ьЛЬьаР(createdAt)ьЭШ эШДьЮм эЩЬьД▒ threshold
        ъ╕░ьдАьЬ╝ыбЬ эПЙъ░АэХйыЛИыЛд.

        - эПЙъ░А ъ▓░ъ│╝(violation)ъ░А 1ъ░Ь ьЭ┤ьГБьЭ┤ый┤ alert 1ъ░Ьые╝ ьГЭьД▒эХйыЛИыЛд.

        - violation/alertыКФ эММьГЭ ыН░ьЭ┤эД░ьЭ┤ый░, threshold ьВньаЬ/ьИШьаХьЭА ъ╕░ьб┤ violation/alertые╝ ьЮРыПЩьЬ╝ыбЬ ы│Аъ▓╜эХШьзА
        ьХКьК╡ыЛИыЛд.

        "
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HealthRecordCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthRecordDetailResponse"
  /health-records/{healthRecordId}:
    get:
      tags:
        - HealthRecord
      summary: ъ▒┤ъ░Х ь╕бьаХ ъ╕░ыбЭ ыЛиъ▒┤ ьб░эЪМ (ьЬДы░Ш ыВ┤ьЧн эПмэХи)
      parameters:
        - $ref: "#/components/parameters/HealthRecordId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthRecordDetailResponse"
      description:
        " - ъ╕░ыбЭ ьГБьД╕ьЭШ violation ыкйыбЭьЭА эХ┤ыЛ╣ recordъ░А ызИьзАызЙьЬ╝ыбЬ эПЙъ░А(evaluated_at)ыРа ыЛ╣ьЛЬ
        ьаБьЪйыРЬ thresholdыбЬ ьГЭьД▒ыРЬ ъ▓░ъ│╝ьЮЕыЛИыЛд.

        - thresholdъ░А ьВньаЬ(soft delete)ыРШьЦ┤ыПД ъ│╝ъ▒░ violationьЭА ьЬаьзАыРШый░, threshold_idыбЬ ьб░эЪМ ъ░АыКеэХйыЛИыЛд.

        "
    patch:
      tags:
        - HealthRecord
      summary: ъ▒┤ъ░Х ь╕бьаХ ъ╕░ыбЭ ьИШьаХ (ъ╕░ьб┤ alert soft-delete эЫД ьЮмэПЙъ░А)
      description: "- recordыКФ ьГЭьД▒(createdAt) эЫД 10ы╢Д ьЭ┤ыВ┤ьЧРызМ ьИШьаХ ъ░АыКе

        - ьИШьаХ ьЛЬ эХ┤ыЛ╣ recordыбЬ ьГЭьД▒ыРЬ alert/violationьЭА deleted_at=now()ыбЬ ым┤эЪиэЩФ(soft delete)

        - ьЭ┤эЫД эШДьЮм эЩЬьД▒ threshold(threshold.deleted_at IS NULL) ъ╕░ьдАьЬ╝ыбЬ ьЮмэПЙъ░АэХШьЧм violation ьЮмьГЭьД▒

        - violationьЭ┤ 1ъ░Ь ьЭ┤ьГБьЭ┤ый┤ alert 1ъ░Ьые╝ ьЮмьГЭьД▒(health_record_id ыЛиьЬД)

        - typeьЧР ызЮыКФ эХДыУЬ ьД╕эК╕ые╝ ьЩДьД▒эШХьЬ╝ыбЬ ы│┤ыВ┤ьХ╝ эХи(BPый┤ systolic, diastolic ъ░ЩьЭ┤). ьХДыЛИый┤ 400

        "
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/HealthRecordId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HealthRecordUpdateRequest"
            examples:
              hr_ok:
                value:
                  measuredAt: "2026-02-25T12:00:00Z"
                  bpm: 72
              bp_ok:
                value:
                  measuredAt: "2026-02-25T12:00:00Z"
                  systolic: 120
                  diastolic: 80
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthRecordDetailResponse"
        "409":
          description: ьИШьаХ ъ░АыКе ьЛЬъ░Д(10ы╢Д)ьЭ┤ ызМыгМыРЬ recordьЮЕыЛИыЛд.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                example:
                  value:
                    code: EDIT_WINDOW_EXPIRED
                    message: Record can only be edited within 10 minutes of creation.
                    details:
                      - field: healthRecordId
                        reason: edit window expired
        "400":
          description: Bad Request (type ы╢ИьЭ╝ь╣Ш/эХДьИШ эХДыУЬ ыИДыЭ╜/ъ▓АьжЭ ьЛдэМи)
          content:
            application/json:
              schema:
                $ref: ""
              examples:
                bp_missing_field:
                  value:
                    code: INVALID_REQUEST
                    message: BP record update requires both systolic and diastolic
                    fieldErrors:
                      - field: diastolic
                        reason: required
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - HealthRecord
      summary: ъ▒┤ъ░Х ь╕бьаХ ъ╕░ыбЭ ьВньаЬ (ьЧ░ъ┤А alert/violation soft-delete)
      description:
        "- MVP ьаХь▒Е: health_record ьВньаЬ ьЛЬ ьЧ░ъ┤А alert/record_violation soft-delete

        "
      parameters:
        - $ref: "#/components/parameters/HealthRecordId"
      responses:
        "204":
          description: No Content
  /thresholds:
    get:
      tags:
        - Threshold
      summary: Threshold ыкйыбЭ ьб░эЪМ
      parameters:
        - $ref: "#/components/parameters/Metric"
        - $ref: "#/components/parameters/RuleType"
        - $ref: "#/components/parameters/IncludeDeleted"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThresholdListResponse"
      description: "- ъ╕░ы│╕ьаБьЬ╝ыбЬ ьВньаЬыРШьзА ьХКьЭА thresholdызМ ы░ШэЩШэХйыЛИыЛд.

        - include_deleted=trueьЭ┤ый┤ deleted_atьЭ┤ ьЮИыКФ thresholdыПД эХиъ╗Ш ы░ШэЩШэХйыЛИыЛд.

        "
    post:
      tags:
        - Threshold
      summary: Threshold ьГЭьД▒ (эЩХьЮеэШХ rule_details)
      description:
        "- ruleTypeьЧР ыФ░ыЭ╝ ruleDetails(oneOf)ъ░А ыЛмыЭ╝ьзР(1.0ьЧРьДЬыКФ rangeызМ эЧИьЪй)

        - эЩЬьД▒ thresholdыКФ (userId, metric, ruleType) ъ╕░ьдАьЬ╝ыбЬ 1ъ░ЬызМ эЧИьЪй (deleted_at IS NULL
        ъ╕░ьдА)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThresholdCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Threshold"
        "409":
          description: Unique constraint violation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /thresholds/{thresholdId}:
    get:
      tags:
        - Threshold
      summary: Threshold ыЛиъ▒┤ ьб░эЪМ
      parameters:
        - $ref: "#/components/parameters/ThresholdId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Threshold"
    patch:
      tags:
        - Threshold
      summary: Threshold ьИШьаХ(ы▓ДьаД ьГЭьД▒)
      parameters:
        - $ref: "#/components/parameters/ThresholdId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThresholdUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Threshold"
      description:
        "- threshold ьИШьаХьЭА ы▓ДьаД ы░йьЛЭьЬ╝ыбЬ ь▓ШыжмэХйыЛИыЛд.\n  1) ъ╕░ьб┤ thresholdые╝ soft delete(threshold.deleted_at=now())\n\
        \  2) ьИШьаХыРЬ ыВ┤ьЪйьЬ╝ыбЬ ьГИыбЬьЪ┤ threshold rowые╝ ьГЭьД▒эХШьЧм ы░ШэЩШ\n- ьИШьаХыРЬ thresholdыКФ эЦеэЫД record эПЙъ░АьЧРызМ\
        \ ьаБьЪйыРйыЛИыЛд.\n- ъ│╝ъ▒░ alert/violationьЭА ьЮРыПЩьЬ╝ыбЬ ьЮмэПЙъ░АэХШьзА ьХКьК╡ыЛИыЛд.\n"
    delete:
      tags:
        - Threshold
      summary: Threshold ьВньаЬ(soft-delete)
      description:
        "- threshold ьВньаЬыКФ soft delete(threshold.deleted_at=now()) ьЮЕыЛИыЛд.

        - ьВньаЬыРЬ thresholdыКФ эЦеэЫД record эПЙъ░АьЧРьДЬ ьаЬьЩ╕ыРйыЛИыЛд.

        - эХ┤ыЛ╣ thresholdыбЬ ъ│╝ъ▒░ьЧР ьГЭьД▒ыРЬ alert/violationьЭА ы│Аъ▓╜/ьВньаЬэХШьзА ьХКьК╡ыЛИыЛд(ьЭ┤ы▓дэК╕/эПЙъ░А ьЭ┤ыае).

        "
      parameters:
        - $ref: "#/components/parameters/ThresholdId"
      responses:
        "204":
          description: No Content
  /alerts:
    get:
      tags:
        - Alert
      summary: Alert ыкйыбЭ ьб░эЪМ (is_silent=false AND is_deleted=false)
      parameters:
        - $ref: "#/components/parameters/UnreadOnly"
        - $ref: "#/components/parameters/FromCreatedAt"
        - $ref: "#/components/parameters/ToCreatedAt"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertListResponse"
  /alerts/{alertId}:
    get:
      tags:
        - Alert
      summary: Alert ыЛиъ▒┤ ьб░эЪМ, is_silent=trueыКФ 404ыбЬ ь╖иъ╕Й
      parameters:
        - $ref: "#/components/parameters/AlertId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags:
        - Alert
      summary: Alert ьЭ╜ьЭМ ь▓Шыжм
      parameters:
        - $ref: "#/components/parameters/AlertId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertMarkReadRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
    delete:
      tags:
        - Alert
      summary: Alert ьВньаЬ(soft-delete)
      description: "- ьВньаЬыКФ deleted_at=now()ыбЬ ь▓Шыжм

        "
      parameters:
        - $ref: "#/components/parameters/AlertId"
      responses:
        "204":
          description: No Content
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: эЖаэБ░ ьЮмы░Ьъ╕Й (Refresh Rotation)
      description:
        "- refresh_tokenьЭ┤ ьЬаэЪиэХШый┤ ьГИ access_tokenъ│╝ ьГИ refresh_tokenьЭД ы░Ьъ╕Й

        - ъ╕░ьб┤ refresh_tokenьЭА revoked ь▓Шыжм(ыбЬэЕМьЭ┤ьЕШ)"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      tags:
        - Auth
      summary: ыбЬъ╖╕ьХДьЫГ (Refresh Token эПРъ╕░)
      description: logoutьЭА refresh tokenызМьЬ╝ыбЬ ь▓Шыжм(access ьЭ╕ьжЭ ьаЬъ▒░)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request (эШХьЛЭ ьШдыеШ)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_format:
                  value:
                    code: INVALID_REQUEST
                    message: refreshToken is required
        "401":
          description: Unauthorized (refresh token ым┤эЪи/ызМыгМ/эПРъ╕░)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_token:
                  value:
                    code: INVALID_REFRESH_TOKEN
                    message: Refresh token is invalid or expired
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    HealthRecordId:
      name: healthRecordId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ThresholdId:
      name: thresholdId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    AlertId:
      name: alertId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Type:
      name: type
      in: query
      schema:
        $ref: "#/components/schemas/HealthRecordType"
    Metric:
      name: metric
      in: query
      schema:
        $ref: "#/components/schemas/Metric"
    RuleType:
      name: rule_type
      in: query
      schema:
        $ref: "#/components/schemas/RuleType"
    UnreadOnly:
      name: unread_only
      in: query
      schema:
        type: boolean
        default: false
    FromMeasuredAt:
      name: from_measured_at
      in: query
      schema:
        type: string
        format: date-time
    ToMeasuredAt:
      name: to_measured_at
      in: query
      schema:
        type: string
        format: date-time
    FromCreatedAt:
      name: from_created_at
      in: query
      schema:
        type: string
        format: date-time
    ToCreatedAt:
      name: to_created_at
      in: query
      schema:
        type: string
        format: date-time
    IncludeDeleted:
      name: include_deleted
      in: query
      schema:
        type: boolean
        default: false
      description: trueый┤ soft-deleted(deleted_at not null) thresholdыПД эПмэХи
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Invalid request
        fieldErrors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: measuredAt
              reason:
                type: string
                example: must be ISO-8601 date-time
      required:
        - code
        - message
    FieldError:
      type: object
      additionalProperties: false
      properties:
        field:
          type: string
          example: diastolic
        reason:
          type: string
          example: required
      required:
        - field
        - reason
    PageInfo:
      type: object
      properties:
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          example: 123
        totalPages:
          type: integer
          example: 7
        hasPrev:
          type: boolean
        hasNext:
          type: boolean
      required:
        - page
        - size
        - totalElements
        - totalPages
        - hasPrev
        - hasNext
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 320
        password:
          type: string
          minLength: 8
          maxLength: 72
      required:
        - email
        - password
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        user:
          $ref: "#/components/schemas/User"
        refreshToken:
          type: string
          description: ьЮмы░Ьъ╕Й/ыбЬъ╖╕ьХДьЫГьЧР ьВмьЪй. ьЫРым╕ ьаАьЮе ъ╕ИьзА(ьДЬы▓ДыКФ эХ┤ьЛЬ ьаАьЮе)
      required:
        - accessToken
        - user
        - tokenType
        - refreshToken
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
          maxLength: 320
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - createdAt
    HealthRecordType:
      type: string
      enum:
        - HR
        - BP
    Metric:
      type: string
      enum:
        - HR
        - BP_SYS
        - BP_DIA
    RuleType:
      type: string
      enum:
        - range
    HealthRecord:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        type:
          $ref: "#/components/schemas/HealthRecordType"
        measuredAt:
          type: string
          format: date-time
          description: UTC
        createdAt:
          type: string
          format: date-time
          description: UTC
        bpm:
          type: integer
          minimum: 1
          maximum: 300
          nullable: true
          description: type=HRьЭ╝ ыХМ ьВмьЪй
        systolic:
          type: integer
          minimum: 50
          maximum: 300
          nullable: true
          description: type=BPьЭ╝ ыХМ ьВмьЪй
        diastolic:
          type: integer
          minimum: 30
          maximum: 200
          nullable: true
          description: type=BPьЭ╝ ыХМ ьВмьЪй
        memo:
          type: string
          nullable: true
          maxLength: 500
      required:
        - id
        - userId
        - type
        - measuredAt
        - createdAt
