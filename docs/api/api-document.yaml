openapi: 3.0.3
info:
  title: Healthcare Threshold & Alert API
  version: 0.2.0
  description: |-
    ## Overview

    건강 지표(심박/혈압)를 기록하고, 사용자별 Threshold 규칙으로 이상 징후를 평가하여 위반(RecordViolation) 및 알림(Alert) 을 생성.

    ### Domain rules (MVP)

    - HealthRecord 생성/수정 시점에 **현재 활성 Threshold(threshold.deleted_at IS NULL)** 기준으로 평가하여 RecordViolation을 생성.
    - 위반이 1개 이상이면 record 당 Alert 1개를 생성.
    - 과거 측정값 입력 시에도 Alert는 생성하되, `measuredAt < now() - 10m` 인 경우 `Alert.is_silent=true` 로 저장되며 기본 조회에서 제외.
    - HealthRecord는 생성 후 10분(createdAt 기준) 까지만 수정 가능.
    - HealthRecord 삭제(soft-delete) 시, 해당 record로 생성된 Alert/RecordViolation도 함께 soft-delete.
    - Threshold 수정은 버전 방식(기존 soft-delete + 신규 row 생성)이며 향후 평가에만 영향을 줌. 과거 Alert/RecordViolation은 자동 변경하지 않음.

    ## Authentication

    - 보호된 API는 `Authorization: Bearer <accessToken>` 헤더가 필요.
    - `/auth/refresh`, `/auth/logout` 은 Access Token 없이 refreshToken 으로만 동작(Body).

    ## Error response standard

    모든 4xx/5xx 에러 응답은 동일한 JSON 포맷을 사용.

    ```json
    {
      "code": "VALIDATION_ERROR",
      "message": "Invalid request",
      "fieldErrors": [
        { "field": "body.diastolic", "reason": "required" }
      ],
      "traceId": "f6d6b0e6b9b64c65",
      "timestamp": "2026-03-02T12:34:56Z"
    }
    ```

    - `code`: 애플리케이션 에러 코드(클라이언트 분기 기준)
    - `message`: 사람이 읽기 좋은 요약 메시지. validation 에러에서는 포괄적인 요약(예: `Invalid request`)을 사용하고, 구체적인 필드 단위 사유는 `fieldErrors`로 전달
    - `fieldErrors`: 입력값 검증 실패 상세. 클라이언트가 필드별 오류를 매핑할 수 있도록 validation 에러에서만 채우며, 그 외에는 빈 배열
    - `traceId`: 로그 추적용(옵션)
    - `timestamp`: 서버 발생 시각(UTC)

    ### Error code catalog (대표)

    | HTTP | code | 의미 |
    | --- | --- | --- |
    | 400 | VALIDATION_ERROR | 요청 스키마/검증 실패 |
    | 401 | UNAUTHORIZED | 인증 실패/만료 |
    | 403 | FORBIDDEN | 권한 없음(리소스 소유자 아님 등) |
    | 404 | RESOURCE_NOT_FOUND | 리소스 없음(또는 접근 불가를 404로 마스킹) |
    | 409 | CONFLICT | 비즈니스 충돌(중복, 수정 가능 시간 만료 등) |
    | 500 | INTERNAL_ERROR | 서버 내부 오류 |

    > 상세한 도메인별 code는 `components.schemas.ErrorCode` 를 참고 바람.

    ## Pagination, sorting, filtering

    - Pagination: `page`는 0-based, `size`는 1~100 (default 20)
    - Sorting: `sort=field,dir` 형식이며 `dir`은 `asc|desc`, 동일 파라미터 반복 가능(예: `sort=measuredAt,desc&sort=id,desc`)
    - Filtering: 기간 필터는 `from_*` inclusive, `to_*` exclusive 를 기본으로 함.
    - 모든 시간 필드는 ISO-8601 `date-time`(timezone 포함)으로 요청/응답하며, 서버는 UTC로 저장 및 응답.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: User
  - name: HealthRecord
  - name: Threshold
  - name: Alert
paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: 회원가입
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              success:
                summary: 회원가입 요청
                value:
                  email: user@example.com
                  password: Password123!
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
              examples:
                success:
                  summary: 가입 성공
                  value:
                    accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ACCESS.TOKEN
                    tokenType: Bearer
                    refreshToken: rft_01HXYZEXAMPLE
                    user:
                      id: 1
                      email: user@example.com
                      createdAt: "2026-03-01T10:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Conflict - 이메일 중복
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                email_already_exists:
                  summary: Conflict - 이메일 중복
                  value:
                    code: EMAIL_ALREADY_EXISTS
                    message: Email already exists
                    fieldErrors: []
                    traceId: f6d6b0e6b9b64c65
                    timestamp: "2026-03-02T12:34:56Z"
      operationId: register
      description: |-
        회원가입.

        - 인증: 없음
        - 목적: 신규 사용자 계정 생성 후 access/refresh 토큰 발급
  /auth/login:
    post:
      tags:
        - Auth
      summary: 로그인
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              success:
                summary: 로그인 요청
                value:
                  email: user@example.com
                  password: Password123!
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
              examples:
                success:
                  summary: 로그인 성공
                  value:
                    accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ACCESS.TOKEN
                    tokenType: Bearer
                    refreshToken: rft_01HXYZEXAMPLE
                    user:
                      id: 1
                      email: user@example.com
                      createdAt: "2026-03-01T10:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Unauthorized - 자격 증명 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_credentials:
                  summary: Unauthorized - 자격 증명 실패
                  value:
                    code: INVALID_CREDENTIALS
                    message: Invalid email or password
                    fieldErrors: []
                    traceId: f6d6b0e6b9b64c65
                    timestamp: "2026-03-02T12:34:56Z"
      operationId: login
      description: |-
        로그인.

        - 인증: 없음
        - 목적: 이메일/비밀번호로 인증 후 access/refresh 토큰 발급
  /users/me:
    get:
      tags:
        - User
      summary: 내 정보 조회
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              examples:
                success:
                  summary: 조회 성공
                  value:
                    id: 1
                    email: user@example.com
                    createdAt: "2026-03-01T10:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
      operationId: getMe
      description: |-
        내 정보 조회.

        - 인증: Bearer Access Token
        - 목적: 로그인된 사용자 정보 반환
      security:
        - bearerAuth: []
    delete:
      tags:
        - User
      summary: 회원 탈퇴(soft-delete)
      description: |-
        회원 탈퇴(soft-delete).

        - 인증: Bearer Access Token
        - 목적: 사용자 계정을 soft-delete 처리하며, refresh_token 전부 revoked 처리 (MVP 정책)
        - 결과: 이후 로그인/토큰 재발급 불가
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
      operationId: deleteMe
      security:
        - bearerAuth: []
  /health-records:
    get:
      tags:
        - HealthRecord
      summary: 건강 측정 기록 목록 조회
      parameters:
        - $ref: "#/components/parameters/FromMeasuredAt"
        - $ref: "#/components/parameters/ToMeasuredAt"
        - $ref: "#/components/parameters/Type"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - $ref: "#/components/parameters/SortHealthRecords"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthRecordListResponse"
              examples:
                success:
                  summary: 목록 조회 성공
                  value:
                    items:
                      - id: 101
                        userId: 1
                        type: BP
                        measuredAt: "2026-03-01T21:00:00Z"
                        createdAt: "2026-03-01T21:00:30Z"
                        bpm: null
                        systolic: 120
                        diastolic: 80
                        memo: null
                      - id: 100
                        userId: 1
                        type: HR
                        measuredAt: "2026-03-01T09:00:00Z"
                        createdAt: "2026-03-01T09:01:00Z"
                        bpm: 72
                        systolic: null
                        diastolic: null
                        memo: morning
                    pageInfo:
                      page: 0
                      size: 20
                      totalElements: 2
                      totalPages: 1
                      hasPrev: false
                      hasNext: false
        "400":
          description: Bad Request - 기간 필터 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_range:
                  summary: Bad Request - 기간 필터 오류
                  value:
                    code: VALIDATION_ERROR
                    message: Invalid request
                    fieldErrors:
                      - field: query.fromMeasuredAt
                        reason: invalid
                    traceId: f6d6b0e6b9b64c65
                    timestamp: "2026-03-02T12:34:56Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
      operationId: listHealthRecords
      description: |-
        건강 측정 기록 목록 조회.

        - 인증: Bearer Access Token
        - 필터: `fromMeasuredAt`(inclusive), `toMeasuredAt`(exclusive), `type`
        - 페이지네이션: `page`(0-based), `size`(1~100)
        - 정렬: `sort=measuredAt,desc` 기본
      security:
        - bearerAuth: []
    post:
      tags:
        - HealthRecord
      summary: 건강 측정 기록 생성
      description: |-
        건강 측정 기록 생성.

        - 인증: Bearer Access Token
        - 목적: 측정값 저장 + 현재 활성 Threshold로 평가하여 violations/alert 생성
        - 과거 시점(measuredAt) 입력 시에도 '입력 시점(createdAt)'의 활성 threshold 기준으로 평가합니다.
        - 위반이 1개 이상이면 alert 1개를 생성합니다.
        - `measuredAt < now() - 10m` 인 경우 생성되는 alert는 `is_silent=true` 로 저장되며 기본 조회(/alerts)에서 제외됩니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HealthRecordCreateRequest"
            examples:
              hr_ok:
                summary: 심박 기록 생성
                value:
                  type: HR
                  measuredAt: "2026-03-01T09:00:00Z"
                  bpm: 72
                  memo: morning
              bp_ok:
                summary: 혈압 기록 생성
                value:
                  type: BP
                  measuredAt: "2026-03-01T21:00:00Z"
                  systolic: 120
                  diastolic: 80
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthRecordDetailResponse"
              examples:
                success:
                  summary: 생성 성공
                  value:
                    healthRecord:
                      id: 100
                      userId: 1
                      type: HR
                      measuredAt: "2026-03-01T09:00:00Z"
                      createdAt: "2026-03-01T09:01:00Z"
                      bpm: 72
                      systolic: null
                      diastolic: null
                      memo: morning
                    violations: []
        "400":
          description: Bad Request - 필수 필드 누락/검증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                bp_missing_field:
                  summary: Bad Request - 필수 필드 누락/검증 실패
                  value:
                    code: VALIDATION_ERROR
                    message: Invalid request
                    fieldErrors:
                      - field: body.diastolic
                        reason: required
                    traceId: f6d6b0e6b9b64c65
                    timestamp: "2026-03-02T12:34:56Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
      operationId: createHealthRecord
      security:
        - bearerAuth: []
  /health-records/{healthRecordId}:
    get:
      tags:
        - HealthRecord
      summary: 건강 측정 기록 단건 조회 (위반 내역 포함)
      parameters:
        - $ref: "#/components/parameters/HealthRecordId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthRecordDetailResponse"
              examples:
                success:
                  summary: 조회 성공(위반 1건 포함)
                  value:
                    healthRecord:
                      id: 100
                      userId: 1
                      type: HR
                      measuredAt: "2026-03-01T09:00:00Z"
                      createdAt: "2026-03-01T09:01:00Z"
                      bpm: 120
                      systolic: null
                      diastolic: null
                      memo: null
                    violations:
                      - id: 900
                        healthRecordId: 100
                        thresholdId: 300
                        metric: HR
                        ruleType: range
                        measuredValue: 120.0
                        direction: above_max
                        evaluatedAt: "2026-03-01T09:01:00Z"
                        message: HR is above max threshold (measured=120, max=100)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Not Found - 기록 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                not_found:
                  summary: Not Found - 기록 없음
                  value:
                    code: HEALTH_RECORD_NOT_FOUND
                    message: HealthRecord not found
                    fieldErrors: []
                    traceId: f6d6b0e6b9b64c65
                    timestamp: "2026-03-02T12:34:56Z"
      description: |-
        건강 측정 기록 단건 조회 (위반 내역 포함).

        - 인증: Bearer Access Token
        - 목적: 기록 + 마지막 평가 시점(evaluatedAt)의 violations 반환
        - 주의: threshold가 삭제/수정되어도 과거 violation은 유지됩니다(평가 이력).
      operationId: getHealthRecord
      security:
        - bearerAuth: []
    patch:
      tags:
        - HealthRecord
      summary: 건강 측정 기록 수정 (기존 alert soft-delete 후 재평가)
      description: |-
        건강 측정 기록 수정.

        - 인증: Bearer Access Token
        - 정책: record는 생성(createdAt) 후 10분 이내에만 수정 가능
        - 수정 시 기존 alert/violation은 soft-delete 후, 현재 활성 threshold 기준으로 재평가하여 재생성
        - 요청은 HR 또는 BP 중 하나의 '완성형'이어야 합니다(oneOf).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/HealthRecordId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HealthRecordUpdateRequest"
            examples:
              hr_ok:
                value:
                  measuredAt: "2026-02-25T12:00:00Z"
                  bpm: 72
              bp_ok:
                value:
                  measuredAt: "2026-02-25T12:00:00Z"
                  systolic: 120
                  diastolic: 80
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthRecordDetailResponse"
              examples:
                success:
                  summary: 수정 성공
                  value:
                    healthRecord:
                      id: 100
                      userId: 1
                      type: HR
                      measuredAt: "2026-03-01T09:02:00Z"
                      createdAt: "2026-03-01T09:01:00Z"
                      bpm: 75
                      systolic: null
                      diastolic: null
                      memo: after edit
                    violations: []
        "409":
          description: Conflict - 수정 가능 시간 만료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                edit_window_expired:
                  summary: Conflict - 수정 가능 시간 만료
                  value:
                    code: EDIT_WINDOW_EXPIRED
                    message: Record can only be edited within 10 minutes of creation.
                    fieldErrors: []
                    traceId: f6d6b0e6b9b64c65
                    timestamp: "2026-03-02T12:34:56Z"
        "400":
          description: Bad Request - type 불일치/필수 필드 누락/검증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                bp_missing_field:
                  summary: Bad Request - type 불일치/필수 필드 누락/검증 실패
                  value:
                    code: VALIDATION_ERROR
                    message: Invalid request
                    fieldErrors:
                      - field: body.diastolic
                        reason: required
                    traceId: f6d6b0e6b9b64c65
                    timestamp: "2026-03-02T12:34:56Z"
        "404":
          description: Not Found - 기록 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                not_found:
                  summary: Not Found - 기록 없음
                  value:
                    code: HEALTH_RECORD_NOT_FOUND
                    message: HealthRecord not found
                    fieldErrors: []
                    traceId: f6d6b0e6b9b64c65
                    timestamp: "2026-03-02T12:34:56Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      operationId: updateHealthRecord
    delete:
      tags:
        - HealthRecord
      summary: 건강 측정 기록 삭제 (연관 alert/violation soft-delete)
      description: |-
        건강 측정 기록 삭제(soft-delete).

        - 인증: Bearer Access Token
        - 목적: health_record 삭제 시 연관 alert/record_violation도 함께 soft-delete (MVP 정책)
      parameters:
        - $ref: "#/components/parameters/HealthRecordId"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Not Found - 기록 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                not_found:
                  summary: Not Found - 기록 없음
                  value:
                    code: HEALTH_RECORD_NOT_FOUND
                    message: HealthRecord not found
                    fieldErrors: []
                    traceId: f6d6b0e6b9b64c65
                    timestamp: "2026-03-02T12:34:56Z"
      operationId: deleteHealthRecord
      security:
        - bearerAuth: []
  /thresholds:
    get:
      tags:
        - Threshold
      summary: Threshold 목록 조회
      parameters:
        - $ref: "#/components/parameters/Metric"
        - $ref: "#/components/parameters/RuleType"
        - $ref: "#/components/parameters/IncludeDeleted"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThresholdListResponse"
              examples:
                success:
                  summary: 조회 성공
                  value:
                    items:
                      - id: 300
                        userId: 1
                        metric: HR
                        ruleType: range
                        createdAt: "2026-03-01T08:00:00Z"
                        deletedAt: null
                        ruleDetails:
                          ruleType: range
                          minValue: 40.0
                          maxValue: 100.0
        "401":
          $ref: "#/components/responses/Unauthorized"
      operationId: listThresholds
      description: |-
        Threshold 목록 조회.

        - 인증: Bearer Access Token
        - 필터: `metric`, `ruleType`
        - `includeDeleted=true`면 soft-deleted threshold도 포함합니다(버전 이력 확인 목적).
        - 기본적으로 활성 threshold(deletedAt=null)만 반환합니다.
      security:
        - bearerAuth: []
    post:
      tags:
        - Threshold
      summary: Threshold 생성 (확장형 rule_details)
      description: |-
        Threshold 생성.

        - 인증: Bearer Access Token
        - 목적: 사용자별 기준(임계값) 설정
        - 제약: 활성 threshold는 (userId, metric, ruleType) 기준으로 1개만 허용(deletedAt=null)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThresholdCreateRequest"
            examples:
              range_hr:
                summary: HR range threshold 생성
                value:
                  metric: HR
                  ruleDetails:
                    ruleType: range
                    minValue: 40
                    maxValue: 100
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Threshold"
              examples:
                success:
                  summary: 생성 성공
                  value:
                    id: 300
                    userId: 1
                    metric: HR
                    ruleType: range
                    createdAt: "2026-03-01T08:00:00Z"
                    deletedAt: null
                    ruleDetails:
                      ruleType: range
                      minValue: 40.0
                      maxValue: 100.0
        "409":
          description: Conflict - 이미 존재하는 threshold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                threshold_already_exists:
                  summary: Conflict - 이미 존재하는 threshold
                  value:
                    code: THRESHOLD_ALREADY_EXISTS
                    message: Active threshold already exists for (metric, ruleType)
                    fieldErrors: []
                    traceId: f6d6b0e6b9b64c65
                    timestamp: "2026-03-02T12:34:56Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
      operationId: createThreshold
      security:
        - bearerAuth: []
