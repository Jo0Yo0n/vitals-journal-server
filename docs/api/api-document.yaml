      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            validation_error:
              summary: Validation error
              value:
                code: VALIDATION_ERROR
                message: Invalid request
                fieldErrors:
                  - field: body.measuredAt
                    reason: invalid
                traceId: f6d6b0e6b9b64c65
                timestamp: "2026-03-02T12:34:56Z"
    Unauthorized:
      description: Unauthorized (인증 실패/만료)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            unauthorized:
              summary: Missing/invalid access token
              value:
                code: UNAUTHORIZED
                message: Authentication required
                fieldErrors: []
                traceId: f6d6b0e6b9b64c65
                timestamp: "2026-03-02T12:34:56Z"
    Forbidden:
      description: Forbidden (권한 없음)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            forbidden:
              summary: Not the resource owner
              value:
                code: FORBIDDEN
                message: You do not have permission to access this resource
                fieldErrors: []
                traceId: f6d6b0e6b9b64c65
                timestamp: "2026-03-02T12:34:56Z"
    NotFound:
      description: Not Found (리소스 없음)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            not_found:
              summary: Resource not found
              value:
                code: RESOURCE_NOT_FOUND
                message: Resource not found
                fieldErrors: []
                traceId: f6d6b0e6b9b64c65
                timestamp: "2026-03-02T12:34:56Z"
    Conflict:
      description: Conflict (비즈니스 충돌/중복)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            conflict:
              summary: Business conflict
              value:
                code: CONFLICT
                message: Conflict occurred
                fieldErrors: []
                traceId: f6d6b0e6b9b64c65
                timestamp: "2026-03-02T12:34:56Z"
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            internal:
              summary: Unexpected error
              value:
                code: INTERNAL_ERROR
                message: Unexpected error
                fieldErrors: []
                traceId: f6d6b0e6b9b64c65
                timestamp: "2026-03-02T12:34:56Z"
