      required:
        - read
      additionalProperties: false
    AlertListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
        pageInfo:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - pageInfo
      additionalProperties: false
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          description: Refresh Token(원문 저장 금지).
      required:
        - refreshToken
      additionalProperties: false
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          description: 폐기할 Refresh Token
      required:
        - refreshToken
      additionalProperties: false
    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - INVALID_REQUEST
        - EMAIL_ALREADY_EXISTS
        - INVALID_CREDENTIALS
        - INVALID_REFRESH_TOKEN
        - UNAUTHORIZED
        - HEALTH_RECORD_NOT_FOUND
        - EDIT_WINDOW_EXPIRED
        - HEALTH_RECORD_TYPE_MISMATCH
        - THRESHOLD_NOT_FOUND
        - THRESHOLD_ALREADY_EXISTS
        - INVALID_THRESHOLD_RANGE
        - ALERT_NOT_FOUND
        - INTERNAL_ERROR
      description: 애플리케이션 에러 코드. HTTP 상태코드와 함께 사용하여 클라이언트가 안정적으로 분기할 수 있도록 합니다.
    HealthRecordCreateHR:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - HR
          example: HR
        measuredAt:
          type: string
          format: date-time
          description: 측정 시각(ISO-8601, timezone 포함). 서버는 UTC로 저장.
        bpm:
          type: integer
          minimum: 1
          maximum: 300
          description: 심박수(bpm). type=HR일 때 필수
        memo:
          type: string
          nullable: true
          maxLength: 500
      required:
        - type
        - measuredAt
        - bpm
      description: 심박(Heart Rate) 기록 생성
    HealthRecordCreateBP:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - BP
          example: BP
        measuredAt:
          type: string
          format: date-time
          description: 측정 시각(ISO-8601, timezone 포함). 서버는 UTC로 저장.
        systolic:
          type: integer
          minimum: 50
          maximum: 300
          description: 수축기 혈압. type=BP일 때 필수
        diastolic:
          type: integer
          minimum: 30
          maximum: 200
          description: 이완기 혈압. type=BP일 때 필수
        memo:
          type: string
          nullable: true
          maxLength: 500
      required:
        - type
        - measuredAt
