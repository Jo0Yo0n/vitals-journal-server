      discriminator:
        propertyName: type
        mapping:
          HR: "#/components/schemas/HealthRecordCreateHR"
          BP: "#/components/schemas/HealthRecordCreateBP"
    HealthRecordUpdateRequest:
      oneOf:
        - $ref: "#/components/schemas/HealthRecordUpdateHR"
        - $ref: "#/components/schemas/HealthRecordUpdateBP"
      description: HR 또는 BP 중 하나의 완성형 업데이트 요청
    HealthRecordUpdateHR:
      type: object
      additionalProperties: false
      properties:
        measuredAt:
          type: string
          format: date-time
          description: 측정 시간(수정 가능)
        bpm:
          type: integer
          minimum: 1
          maximum: 300
        memo:
          type: string
          nullable: true
          maxLength: 500
      required:
        - bpm
    HealthRecordUpdateBP:
      type: object
      additionalProperties: false
      properties:
        measuredAt:
          type: string
          format: date-time
          description: 측정 시간(수정 가능)
        systolic:
          type: integer
          minimum: 50
          maximum: 300
        diastolic:
          type: integer
          minimum: 30
          maximum: 200
        memo:
          type: string
          nullable: true
          maxLength: 500
      required:
        - systolic
        - diastolic
    HealthRecordListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/HealthRecord"
        pageInfo:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - pageInfo
      additionalProperties: false
    RecordViolation:
      type: object
      properties:
        id:
          type: integer
          format: int64
        healthRecordId:
          type: integer
          format: int64
        thresholdId:
          type: integer
          format: int64
        metric:
          $ref: "#/components/schemas/Metric"
        ruleType:
          $ref: "#/components/schemas/RuleType"
        measuredValue:
          type: number
          format: double
        direction:
          type: string
          nullable: true
          enum:
            - below_min
            - above_max
        evaluatedAt:
          type: string
          format: date-time
        message:
          type: string
          description: UI 표시용 문구(서버에서 조합)
          nullable: false
          example: HR is above max threshold (measured=120, max=100)
      required:
        - id
        - healthRecordId
        - thresholdId
        - metric
        - ruleType
        - measuredValue
        - evaluatedAt
        - message
      additionalProperties: false
    ViolationRuleSummary:
      oneOf:
        - $ref: "#/components/schemas/ViolationRangeSummary"
      description: 1.0 MVP에서는 range rule만 지원
    ViolationRangeSummary:
      type: object
      properties:
        ruleType:
          type: string
          enum:
            - range
        minValue:
          type: number
          format: double
          nullable: true
        maxValue:
          type: number
          format: double
          nullable: true
        violated:
          type: string
          enum:
            - below_min
            - above_max
            - out_of_range
      required:
        - ruleType
        - violated
    Threshold:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        metric:
          $ref: "#/components/schemas/Metric"
        ruleType:
          $ref: "#/components/schemas/RuleType"
        createdAt:
          type: string
          format: date-time
          description: 생성 시각(UTC). 버전 row 생성 시각
        ruleDetails:
          $ref: "#/components/schemas/ThresholdRuleDetails"
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: soft-delete 시각(UTC). 활성 threshold는 null
      required:
        - id
        - userId
        - metric
        - ruleType
        - createdAt
        - ruleDetails
      additionalProperties: false
    ThresholdRuleDetails:
      oneOf:
        - $ref: "#/components/schemas/ThresholdRangeRule"
      description: 1.0 MVP에서는 range rule만 지원
      discriminator:
        propertyName: ruleType
        mapping:
          range: "#/components/schemas/ThresholdRangeRule"
    ThresholdRangeRule:
      type: object
      additionalProperties: false
      properties:
        ruleType:
          type: string
          enum:
            - range
          default: range
          description: MVP에서는 range만 지원
        minValue:
          type: number
          format: double
          nullable: true
          description: 최소 허용값(없으면 하한 없음)
        maxValue:
          type: number
          format: double
          nullable: true
          description: 최대 허용값(없으면 상한 없음)
      description: range 규칙. minValue 또는 maxValue 중 최소 하나는 필요(둘 다 null이면 400).
    ThresholdCreateRequest:
      type: object
      properties:
        metric:
          $ref: "#/components/schemas/Metric"
          description: 대상 지표
        ruleDetails:
          $ref: "#/components/schemas/ThresholdRuleDetails"
          description: "규칙 상세(MVP: range만 지원)"
