      tags:
        - Auth
      summary: 로그아웃 (Refresh Token 폐기)
      description: |-
        로그아웃(Refresh Token 폐기).

        - 인증: 없음(Access Token 불필요)
        - 목적: refresh token을 revoked 처리하여 재사용 불가하게 함
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
            examples:
              success:
                summary: 로그아웃 요청
                value:
                  refreshToken: rft_01HXYZEXAMPLE
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request - 형식 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing_refresh_token:
                  summary: Bad Request - 형식 오류
                  value:
                    code: VALIDATION_ERROR
                    message: Invalid request
                    fieldErrors:
                      - field: body.refreshToken
                        reason: required
                    traceId: f6d6b0e6b9b64c65
                    timestamp: "2026-03-02T12:34:56Z"
        "401":
          description: Unauthorized - refresh token 무효/만료/폐기
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_refresh_token:
                  summary: Unauthorized - refresh token 무효/만료/폐기
                  value:
                    code: INVALID_REFRESH_TOKEN
                    message: Refresh token is invalid or expired
                    fieldErrors: []
                    traceId: f6d6b0e6b9b64c65
                    timestamp: "2026-03-02T12:34:56Z"
      operationId: logout
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    HealthRecordId:
      name: healthRecordId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ThresholdId:
      name: thresholdId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    AlertId:
      name: alertId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
      description: 0-based 페이지 인덱스
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: 페이지 크기(1~100)
    Type:
      name: type
      in: query
      schema:
        $ref: "#/components/schemas/HealthRecordType"
      description: 기록 타입 필터(HR/BP)
    Metric:
      name: metric
      in: query
      schema:
        $ref: "#/components/schemas/Metric"
      description: Threshold 대상 지표
    RuleType:
      name: ruleType
      in: query
      schema:
        $ref: "#/components/schemas/RuleType"
      description: "규칙 타입(MVP: range)"
    UnreadOnly:
      name: unreadOnly
      in: query
      schema:
        type: boolean
        default: false
      description: true면 읽지 않은 알림만 조회(readAt is null)
    FromMeasuredAt:
      name: fromMeasuredAt
      in: query
      schema:
        type: string
        format: date-time
      description: 측정 시각 필터 시작(from, inclusive). ISO-8601 date-time
    ToMeasuredAt:
      name: toMeasuredAt
      in: query
      schema:
        type: string
        format: date-time
      description: 측정 시각 필터 끝(to, exclusive). ISO-8601 date-time
    FromCreatedAt:
      name: fromCreatedAt
      in: query
      schema:
        type: string
        format: date-time
      description: 생성 시각 필터 시작(from, inclusive). ISO-8601 date-time
    ToCreatedAt:
      name: toCreatedAt
      in: query
      schema:
        type: string
        format: date-time
      description: 생성 시각 필터 끝(to, exclusive). ISO-8601 date-time
    IncludeDeleted:
      name: includeDeleted
      in: query
      schema:
        type: boolean
        default: false
      description: true면 soft-deleted(deleted_at not null) threshold도 포함
    SortHealthRecords:
      name: sort
      in: query
      required: false
      description: |-
        정렬 기준. 반복 가능. 형식: `field,(asc|desc)`.

        허용 field: `measuredAt`, `createdAt`, `id`.

        기본값: `measuredAt,desc`
      schema:
        type: array
        items:
          type: string
          example: measuredAt,desc
        default:
          - measuredAt,desc
      style: form
      explode: true
    SortAlerts:
      name: sort
      in: query
      required: false
      description: |-
        정렬 기준. 반복 가능. 형식: `field,(asc|desc)`.

        허용 field: `createdAt`, `readAt`, `id`.

        기본값: `createdAt,desc`
      schema:
        type: array
        items:
          type: string
          example: createdAt,desc
        default:
          - createdAt,desc
      style: form
      explode: true
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
          description: 사람이 읽기 좋은 요약 메시지. validation 에러에서는 포괄적인 요약을 사용하고, 비검증 에러에서는 사용자의 다음 행동을 이해할 수 있는 짧고 직접적인 문구를 사용합니다.
        fieldErrors:
          type: array
          description: 입력값(body/query/path) 검증 실패 목록. `VALIDATION_ERROR` 등 검증 실패에서만 채우며, 비즈니스 에러에서는 빈 배열입니다. 클라이언트는 이 목록을 사용해 필드별 오류를 표시합니다.
          items:
            $ref: "#/components/schemas/FieldError"
        traceId:
          type: string
          nullable: true
          description: 서버 로그 상관관계 추적용 ID(옵션).
        timestamp:
          type: string
          format: date-time
          description: 에러 발생 시각(UTC)
      required:
        - code
        - message
        - fieldErrors
        - timestamp
    FieldError:
      type: object
      additionalProperties: false
      properties:
        field:
          type: string
          description: "오류가 발생한 입력 위치. `body.`, `query.`, `path.` 접두어를 포함해 클라이언트가 입력 컴포넌트에 바로 매핑할 수 있는 이름을 사용합니다. (예: body.diastolic, query.fromMeasuredAt)"
          example: body.diastolic
        reason:
          type: string
          description: 입력 검증 실패의 머신-리더블한 사유 코드. 클라이언트는 이 값을 기준으로 필드별 문구를 해석하며, 최상위 `message`를 파싱하지 않습니다. 상호 연관된 값의 검증 실패는 대표 필드 하나에만 매핑합니다. 기간 범위 검증에서는 시작 필드(`from...`)를 사용합니다.
          enum:
            - required
            - invalid
            - invalid
          example: required
        rejectedValue:
          nullable: true
          description: 거부된 입력값(옵션). 민감정보 포함 금지.
          oneOf:
            - type: string
            - type: number
            - type: integer
            - type: boolean
            - type: object
            - type: array
      required:
        - field
        - reason
    PageInfo:
      type: object
      properties:
        page:
          type: integer
          example: 0
          description: 0-based 페이지 인덱스
        size:
          type: integer
          example: 20
          description: 페이지 크기
        totalElements:
          type: integer
          example: 123
          description: 전체 원소 수
        totalPages:
          type: integer
          example: 7
          description: 전체 페이지 수
        hasPrev:
          type: boolean
          description: 이전 페이지 존재 여부
        hasNext:
          type: boolean
          description: 다음 페이지 존재 여부
      required:
        - page
        - size
        - totalElements
        - totalPages
        - hasPrev
        - hasNext
      additionalProperties: false
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 320
          description: 로그인에 사용할 이메일
        password:
          type: string
          minLength: 8
          maxLength: 72
          format: password
          description: 비밀번호(서버에서 해시 저장). 8~72자 권장
      required:
        - email
        - password
      additionalProperties: false
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: 등록된 이메일
        password:
          type: string
          format: password
          description: "비밀번호(평문 전송 금지: HTTPS 필수)"
      required:
        - email
        - password
      additionalProperties: false
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT Access Token (Authorization 헤더에 Bearer로 전달)
        tokenType:
          type: string
          example: Bearer
          description: 항상 Bearer
        user:
          $ref: "#/components/schemas/User"
        refreshToken:
          type: string
          description: Refresh Token (재발급/로그아웃에 사용). 서버는 해시만 저장
      required:
        - accessToken
        - user
        - tokenType
        - refreshToken
      additionalProperties: false
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 사용자 ID
        email:
          type: string
          format: email
          maxLength: 320
        createdAt:
          type: string
          format: date-time
          description: 가입 시각(UTC)
      required:
        - id
        - email
        - createdAt
      additionalProperties: false
    HealthRecordType:
      type: string
      enum:
        - HR
        - BP
    Metric:
      type: string
      enum:
        - HR
        - BP_SYS
        - BP_DIA
    RuleType:
      type: string
      enum:
        - range
    HealthRecord:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 기록 ID
        userId:
          type: integer
          format: int64
          description: 소유자 사용자 ID
        type:
          $ref: "#/components/schemas/HealthRecordType"
        measuredAt:
          type: string
          format: date-time
          description: 측정 시각(UTC)
        createdAt:
          type: string
          format: date-time
          description: 생성 시각(UTC). 수정 가능 시간 계산 기준
        bpm:
          type: integer
          minimum: 1
          maximum: 300
          nullable: true
          description: type=HR일 때 사용
        systolic:
          type: integer
          minimum: 50
          maximum: 300
          nullable: true
          description: type=BP일 때 사용
        diastolic:
          type: integer
          minimum: 30
          maximum: 200
          nullable: true
          description: type=BP일 때 사용
        memo:
          type: string
          nullable: true
          maxLength: 500
          description: 사용자 메모(옵션)
      required:
        - id
        - userId
        - type
        - measuredAt
        - createdAt
      description: 단일 테이블 모델. type=HR이면 bpm 필수, type=BP이면 systolic/diastolic 필수
      additionalProperties: false
    HealthRecordDetailResponse:
      type: object
      properties:
        healthRecord:
          $ref: "#/components/schemas/HealthRecord"
        violations:
          type: array
          items:
            $ref: "#/components/schemas/RecordViolation"
      required:
        - healthRecord
        - violations
      additionalProperties: false
    HealthRecordCreateRequest:
      oneOf:
        - $ref: "#/components/schemas/HealthRecordCreateHR"
        - $ref: "#/components/schemas/HealthRecordCreateBP"
