  /auth/refresh:
    post:
      tags:
        - Auth
      summary: 토큰 재발급 (Refresh Rotation)
      description: |-
        토큰 재발급(Refresh Rotation).

        - 인증: 없음(Access Token 불필요)
        - 목적: refresh_token이 유효하면 새 access_token과 새 refresh_token 발급
        - 정책: 기존 refresh_token은 revoked 처리(로테이션)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
            examples:
              success:
                summary: 재발급 요청
                value:
                  refreshToken: rft_01HXYZEXAMPLE
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
              examples:
                success:
                  summary: 재발급 성공
                  value:
                    accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.NEW.ACCESS.TOKEN
                    tokenType: Bearer
                    refreshToken: rft_01HXYZNEW
                    user:
                      id: 1
                      email: user@example.com
                      createdAt: "2026-03-01T10:00:00Z"
        "401":
          description: Unauthorized - refresh token 무효/만료/폐기
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_refresh_token:
                  summary: Unauthorized - refresh token 무효/만료/폐기
                  value:
                    code: INVALID_REFRESH_TOKEN
                    message: Refresh token is invalid or expired
                    fieldErrors: []
                    traceId: f6d6b0e6b9b64c65
                    timestamp: "2026-03-02T12:34:56Z"
        "400":
          $ref: "#/components/responses/BadRequest"
      operationId: refreshToken
  /auth/logout:
