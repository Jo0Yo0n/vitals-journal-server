services:
    db:
        image: postgres:18
        container_name: vitals-journal-postgres
        ports:
            - "${DB_PORT}:5432"
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - vitals_journal_pgdata:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
            interval: 5s
            timeout: 3s
            retries: 10

volumes:
    vitals_journal_pgdata: